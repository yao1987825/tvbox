server {
    listen 80;
    server_name localhost;
    root /data;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    add_header Access-Control-Allow-Origin *;
    add_header Content-Type "text/plain; charset=utf-8";

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.m3u$ {
        default_type text/plain;
        charset utf-8;
        add_header Content-Type "text/plain; charset=utf-8";
    }
}
