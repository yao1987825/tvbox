version: '3.8'

services:
  iptv_nginx:
    image: nginx:alpine
    container_name: iptv_nginx
    ports:
      - "5353:80"
    volumes:
      - ./data:/data:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  iptv_speedtest:
    image: iptv-speedtest:latest
    container_name: iptv_speedtest
    volumes:
      - ./data:/data
      - ./scripts:/app/scripts
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  iptv_fetcher:
    image: curlimages/curl:latest
    container_name: iptv_fetcher
    command: ["sleep", "infinity"]
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
